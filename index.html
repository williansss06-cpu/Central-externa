<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Consulta de Pedidos + Supabase | Cliente e Frete Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f1f5f9;
      font-family: 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1.5rem;
      color: #0f172a;
    }
    .container { max-width: 100%; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      padding: 1.8rem;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.7rem; font-weight: 600; background: linear-gradient(135deg, #1e293b, #2d3a5e); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1.5rem 0 0.5rem; }
    input[type="file"], button, .supabase-config-row input {
      border-radius: 60px;
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      cursor: pointer;
      transition: 0.2s;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    button:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn-danger { background: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-supabase { background: #0d9488; }
    .btn-supabase:hover { background: #0f766e; }
    .info-status {
      background: #f1f5f9;
      border-radius: 1rem;
      padding: 0.8rem 1.2rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      margin: 1rem 0;
    }
    .contador { font-weight: 700; background: #e6f0ff; padding: 0.2rem 0.8rem; border-radius: 40px; color: #1e40af; }
    .table-wrapper { overflow-x: auto; border-radius: 1rem; border: 1px solid #e2e8f0; background: white; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 1300px; }
    th { background: #f8fafc; padding: 12px 10px; border-bottom: 1px solid #e2e8f0; }
    td { padding: 10px 8px; border-bottom: 1px solid #f1f5f9; }
    tr:hover td { background-color: #fefce8; }
    .supabase-config-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 0.8rem;
      margin-bottom: 1rem;
    }
    .supabase-config-row input { flex: 1; background: white; cursor: text; }
    .status-msg { font-size: 0.8rem; padding: 0.3rem 0.8rem; border-radius: 40px; display: inline-block; }
    .warning-badge { background: #fef9c3; color: #854d0e; }
    .success-badge { background: #d1fae5; color: #065f46; }
    footer { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 2rem; }
    .log-simple { background: #f1f5f9; padding: 0.5rem 1rem; border-radius: 60px; margin-top: 0.5rem; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="container">
  <!-- CARD PRINCIPAL - CSV -->
  <div class="card">
    <div class="toolbar">
      <input type="file" id="csvFileInput" accept=".csv, .txt">
      <button id="btnCarregar">📂 Carregar CSV</button>
      <button id="btnRecarregar">🔄 Recarregar</button>
      <button id="btnLimparTudo" class="btn-danger">🗑️ Limpar</button>
    </div>
    <div class="info-status">
      <span>📊 <span id="contadorLinhas">0 pedidos</span></span>
      <span id="statusTexto">📄 Nenhum arquivo carregado</span>
    </div>
    <div class="table-wrapper">
      <table>
        <thead id="tHead"></thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>
    <div id="logMessage" class="log-simple">✅ Sistema pronto. Carregue um CSV e configure o Supabase.</div>
  </div>

  <!-- CARD SUPABASE -->
  <div class="card">
    <h3>☁️ Enviar para Supabase</h3>
    <div class="supabase-config-row">
      <input type="text" id="supabaseUrl" placeholder="URL do Supabase" value="https://gdlgceoliupjinkgunxe.supabase.co">
      <input type="text" id="supabaseKey" placeholder="Chave anônima (public)" value="sb_publishable_wOUtKsTrZGibGg5_VRT7Bg_UOfSFo0_">
      <input type="text" id="supabaseTable" placeholder="Nome da tabela" value="pedidos">
    </div>
    <div style="display: flex; flex-wrap: wrap; gap: 12px;">
      <button id="saveSupabaseConfigBtn">💾 Salvar Config</button>
      <button id="testSupabaseBtn">🔌 Testar Conexão</button>
      <button id="sendToSupabaseBtn" class="btn-supabase">📤 Enviar Pedidos</button>
    </div>
    <div id="supabaseFeedback" class="log-simple" style="margin-top: 12px;"></div>
    <div id="supabaseConnStatus" class="status-msg warning-badge" style="margin-top: 8px;">⚠️ Não conectado</div>
  </div>
  <footer>Cliente e Frete Pro — Integração com Supabase 100% funcional</footer>
</div>

<script>
  // ======================== CONFIGURAÇÕES ========================
  const COLUNAS_ESPERADAS = [
    "Cliente - CNPJ", "OS", "COD. DEPOSITANTE", "DEPOSITANTE", "CNPJ", "DESTINATARIO", 
    "CEP", "LOGRADOURO", "NUMERO", "BAIRRO", "CIDADE", "UF", "Job", "CODIGO PRODUTO", 
    "Descrição", "PESO BRUTO", "ALTURA", "LARGURA", "PROFUNDIDADE", "METROCUBICO", 
    "OBS", "Data Previsão", "Data da Entrega", "MODALIDADE", "Status"
  ];

  const MAPEAMENTO_BANCO = {
  "Cliente - CNPJ": "cliente_cnpj",
  "OS": "os",
  "COD. DEPOSITANTE": "cod_depositante",
  "DEPOSITANTE": "depositante",
  "CNPJ": "cnpj",
  "DESTINATARIO": "destinatario",
  "CEP": "cep",
  "LOGRADOURO": "logradouro",
  "NUMERO": "numero",
  "BAIRRO": "bairro",
  "CIDADE": "cidade",
  "UF": "uf",
  "Job": "job",
  "CODIGO PRODUTO": "codigo_produto",

  // 🔥 PRODUTO (CORRETO)
  "Descrição": "descricao",

  // 🔥 PESO E DIMENSÕES
  "PESO BRUTO": "peso_bruto",
  "ALTURA": "altura",
  "LARGURA": "largura",
  "PROFUNDIDADE": "profundidade",
  "METROCUBICO": "metro_cubico",

  // 🔥 OUTROS
  "OBS": "obs",
  "Data Previsão": "previsao_despacho",
  "Data da Entrega": "data_entrega",
  "MODALIDADE": "modalidade",
  "Status": "status"
};

  // Estado global
  let dadosPedidos = [];
  let cabecalhosOriginais = [];
  let lastFile = null;
  let supabaseClient = null;

  // Elementos DOM
  const fileInput = document.getElementById("csvFileInput");
  const btnCarregar = document.getElementById("btnCarregar");
  const btnRecarregar = document.getElementById("btnRecarregar");
  const btnLimparTudo = document.getElementById("btnLimparTudo");
  const tHead = document.getElementById("tHead");
  const tBody = document.getElementById("tBody");
  const contadorSpan = document.getElementById("contadorLinhas");
  const statusTexto = document.getElementById("statusTexto");
  const logMsgDiv = document.getElementById("logMessage");

  const supabaseUrlInput = document.getElementById("supabaseUrl");
  const supabaseKeyInput = document.getElementById("supabaseKey");
  const supabaseTableInput = document.getElementById("supabaseTable");
  const saveConfigBtn = document.getElementById("saveSupabaseConfigBtn");
  const testConnBtn = document.getElementById("testSupabaseBtn");
  const sendToSupabaseBtn = document.getElementById("sendToSupabaseBtn");
  const supabaseFeedback = document.getElementById("supabaseFeedback");
  const supabaseConnStatus = document.getElementById("supabaseConnStatus");

  // ======================== FUNÇÕES AUXILIARES ========================
  function setLogMessage(msg, isError = false) {
    logMsgDiv.innerHTML = isError ? `❌ ${msg}` : `✅ ${msg}`;
    logMsgDiv.style.background = isError ? "#fee2e2" : "#e6f7e6";
    logMsgDiv.style.color = isError ? "#b91c1c" : "#2c5f2d";
    setTimeout(() => {
      if (!isError) logMsgDiv.style.background = "#f1f5f9";
    }, 3500);
  }

  function setSupabaseFeedback(msg, isError = false, isSuccess = false) {
    supabaseFeedback.innerHTML = isError ? `❌ ${msg}` : (isSuccess ? `✅ ${msg}` : `ℹ️ ${msg}`);
    supabaseFeedback.style.background = isError ? "#fee2e2" : (isSuccess ? "#e0f2fe" : "#f1f5f9");
  }

  function updateConnStatusUI(connected) {
    if (connected) {
      supabaseConnStatus.innerHTML = "✅ Conectado";
      supabaseConnStatus.className = "status-msg success-badge";
    } else {
      supabaseConnStatus.innerHTML = "⚠️ Não conectado";
      supabaseConnStatus.className = "status-msg warning-badge";
    }
  }

  // Salvar configuração
  function saveSupabaseConfigToLocal() {
    const url = supabaseUrlInput.value.trim();
    const key = supabaseKeyInput.value.trim();
    const table = supabaseTableInput.value.trim() || "pedidos";
    if (!url || !key) {
      setSupabaseFeedback("URL e chave anônima são obrigatórias.", true);
      return false;
    }
    localStorage.setItem("supabase_url", url);
    localStorage.setItem("supabase_anon_key", key);
    localStorage.setItem("supabase_table", table);
    const initOk = initSupabaseClient(url, key);
    if (initOk) {
      setSupabaseFeedback("Configuração salva e cliente Supabase inicializado.", false, true);
      updateConnStatusUI(true);
    } else {
      setSupabaseFeedback("Erro ao criar cliente Supabase. Verifique URL/Key.", true);
      updateConnStatusUI(false);
    }
    return initOk;
  }

  function initSupabaseClient(url, key) {
    try {
      if (!url || !key) throw new Error("Credenciais inválidas");
      supabaseClient = supabase.createClient(url, key);
      return true;
    } catch (err) {
      console.error(err);
      supabaseClient = null;
      return false;
    }
  }

  function loadSupabaseConfigFromStorage() {
    const url = localStorage.getItem("supabase_url");
    const key = localStorage.getItem("supabase_anon_key");
    const table = localStorage.getItem("supabase_table");
    if (url) supabaseUrlInput.value = url;
    if (key) supabaseKeyInput.value = key;
    if (table) supabaseTableInput.value = table;
    if (url && key) {
      initSupabaseClient(url, key);
      updateConnStatusUI(true);
    } else {
      updateConnStatusUI(false);
    }
  }

  async function testSupabaseConnection() {
    if (!supabaseClient) {
      if (!saveSupabaseConfigToLocal()) return false;
    }
    const tableName = supabaseTableInput.value.trim() || "pedidos";
    setSupabaseFeedback(`Testando conexão com tabela "${tableName}"...`);
    try {
      const { error } = await supabaseClient.from(tableName).select("os", { count: "exact", head: true });
      if (error) {
        if (error.message.includes("relation") || error.code === "42P01") {
          setSupabaseFeedback(`Tabela "${tableName}" não existe. Crie-a no SQL Editor.`, true);
        } else {
          setSupabaseFeedback(`Erro de permissão: ${error.message}`, true);
        }
        return false;
      }
      setSupabaseFeedback(`Conexão OK! Tabela "${tableName}" acessível.`, false, true);
      return true;
    } catch (err) {
      setSupabaseFeedback(`Falha: ${err.message}`, true);
      return false;
    }
  }

  function convertToDatabaseRecords(pedidosArray) {
    return pedidosArray.map(pedido => {
      const record = { sincronizado_em: new Date().toISOString() };
      for (const [displayField, dbField] of Object.entries(MAPEAMENTO_BANCO)) {
        let valor = pedido[displayField];
        if (valor === undefined || valor === null) valor = "";
        if (typeof valor === "string") valor = valor.trim();
        record[dbField] = valor === "" ? null : valor;
      }
      return record;
    });
  }

  async function enviarPedidosParaSupabase() {
    if (!supabaseClient) {
      if (!saveSupabaseConfigToLocal()) {
        setSupabaseFeedback("Configure e salve as credenciais do Supabase primeiro.", true);
        return;
      }
    }
    if (!dadosPedidos.length) {
      setSupabaseFeedback("Nenhum pedido carregado. Importe um CSV primeiro.", true);
      return;
    }

    const tableName = supabaseTableInput.value.trim() || "pedidos";
    const dbRecords = convertToDatabaseRecords(dadosPedidos);
    const withOS = dbRecords.filter(r => r.os && r.os.toString().trim() !== "");
    const withoutOS = dbRecords.filter(r => !r.os || r.os.toString().trim() === "");

    sendToSupabaseBtn.disabled = true;
    const originalText = sendToSupabaseBtn.innerHTML;
    sendToSupabaseBtn.innerHTML = "⏳ Enviando...";

    try {
      let upsertError = null, insertError = null;
      let totalUpserted = 0, totalInserted = 0;

      if (withOS.length) {
        const { error } = await supabaseClient.from(tableName).upsert(withOS, { onConflict: 'os', ignoreDuplicates: false });
        if (error) upsertError = error;
        else totalUpserted = withOS.length;
      }
      if (withoutOS.length) {
        const { error } = await supabaseClient.from(tableName).insert(withoutOS);
        if (error) insertError = error;
        else totalInserted = withoutOS.length;
      }

      if (upsertError && insertError) throw new Error(`UPSERT: ${upsertError.message} | INSERT: ${insertError.message}`);
      if (upsertError) throw new Error(`Erro no UPSERT: ${upsertError.message}`);
      if (insertError) throw new Error(`Erro no INSERT: ${insertError.message}`);

      setSupabaseFeedback(`✅ Sucesso! ${totalUpserted} upserts (com OS) + ${totalInserted} inserts (sem OS).`, false, true);
      setLogMessage(`${totalUpserted + totalInserted} registros enviados ao Supabase.`);
    } catch (err) {
      setSupabaseFeedback(`Erro: ${err.message}`, true);
    } finally {
      sendToSupabaseBtn.innerHTML = originalText;
      sendToSupabaseBtn.disabled = false;
    }
  }

  // ======================== PROCESSAMENTO CSV ========================
  function detectDelimiter(firstLine) {
    const delimiters = [",", ";", "\t"];
    let best = ","; let max = 0;
    for (let d of delimiters) {
      let count = (firstLine.match(new RegExp(`\\${d}`, "g")) || []).length;
      if (count > max) { max = count; best = d; }
    }
    return best;
  }

  function cleanCell(v) { return typeof v === "string" ? v.replace(/^["']|["']$/g, '').trim() : v; }

  function formatarValor(col, valor) {
    if (valor == null || valor === "") return "—";
    let str = String(valor).trim();
    if (col === "PESO BRUTO") {
      let num = parseFloat(str.replace(",", "."));
      return isNaN(num) ? str : num.toFixed(2) + " kg";
    }
    if (col === "Data da Entrega") {
      let date = new Date(str.includes("/") ? str.split("/").reverse().join("-") : str);
      return isNaN(date) ? str : date.toLocaleDateString("pt-BR");
    }
    return str;
  }

  function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) : ""; }

  function renderizarTabela(pedidos) {
    if (!pedidos.length) {
      tHead.innerHTML = "";
      tBody.innerHTML = `<tr><td colspan="${COLUNAS_ESPERADAS.length}" class="empty-message">📭 Nenhum pedido importado.</td></tr>`;
      return;
    }
    const colunas = cabecalhosOriginais.length ? cabecalhosOriginais : COLUNAS_ESPERADAS;
    tHead.innerHTML = `<tr>${colunas.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr>`;
    tBody.innerHTML = pedidos.map(p => `<tr>${colunas.map(c => `<td title="${escapeHtml(String(p[c] || ''))}">${escapeHtml(formatarValor(c, p[c]))}</td>`).join('')}</tr>`).join('');
  }

  async function processAndDisplayCSV(file) {
    if (!file) { setLogMessage("Nenhum arquivo selecionado.", true); return false; }
    setLogMessage(`Lendo ${file.name}...`);
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const linhas = e.target.result.split(/\r?\n/).filter(l => l.trim());
          if (linhas.length < 2) throw new Error("Arquivo sem dados.");
          const delim = detectDelimiter(linhas[0]);
          const rawHeaders = linhas[0].split(delim).map(cleanCell);
          const headerIndex = {};
          rawHeaders.forEach((h, idx) => { headerIndex[h.trim()] = idx; });

          const indicesExibir = [];
          const colunasExibir = [];
          for (let col of COLUNAS_ESPERADAS) {
            let idx = -1;
            for (let [key, i] of Object.entries(headerIndex)) {
              if (key.toLowerCase() === col.toLowerCase() || key.replace(/\s/g,'') === col.replace(/\s/g,'')) { idx = i; break; }
            }
            colunasExibir.push(col);
            indicesExibir.push(idx);
          }
          cabecalhosOriginais = [...colunasExibir];

          const pedidos = [];
          for (let i = 1; i < linhas.length; i++) {
            const partes = linhas[i].split(delim).map(cleanCell);
            const row = {};
            for (let j = 0; j < colunasExibir.length; j++) {
              const idxOrig = indicesExibir[j];
              row[colunasExibir[j]] = (idxOrig !== -1 && idxOrig < partes.length) ? partes[idxOrig] : "";
            }
            if (row["OS"] || row["Cliente - CNPJ"] || row["DESTINATARIO"]) pedidos.push(row);
          }
          if (!pedidos.length) throw new Error("Nenhum pedido válido encontrado.");
          dadosPedidos = pedidos;
          renderizarTabela(dadosPedidos);
          contadorSpan.innerText = `${dadosPedidos.length} pedido${dadosPedidos.length !== 1 ? 's' : ''}`;
          statusTexto.innerHTML = `📁 ${file.name} · ${dadosPedidos.length} registros`;
          setLogMessage(`Carregado! ${dadosPedidos.length} pedidos.`);
          lastFile = file;
          resolve(true);
        } catch (err) {
          setLogMessage(`Erro: ${err.message}`, true);
          dadosPedidos = []; cabecalhosOriginais = [];
          renderizarTabela([]);
          contadorSpan.innerText = "0 pedidos";
          statusTexto.innerHTML = "⚠️ Falha";
          reject(err);
        }
      };
      reader.onerror = () => { setLogMessage("Erro na leitura.", true); reject(); };
      reader.readAsText(file, "UTF-8");
    });
  }

  function limparDadosCompletamente() {
    dadosPedidos = [];
    cabecalhosOriginais = [];
    lastFile = null;
    fileInput.value = "";
    renderizarTabela([]);
    contadorSpan.innerText = "0 pedidos";
    statusTexto.innerHTML = "📄 Nenhum arquivo carregado";
    setLogMessage("Lista de pedidos limpa.");
  }

  async function carregarArquivoHandler() {
    const file = fileInput.files[0];
    if (!file) { setLogMessage("Selecione um arquivo CSV.", true); return; }
    await processAndDisplayCSV(file);
  }
  async function recarregarUltimo() {
    if (!lastFile) { setLogMessage("Nenhum arquivo anterior.", true); return; }
    await processAndDisplayCSV(lastFile);
  }
  function limparComConfirmacao() {
    if (!dadosPedidos.length && !lastFile) { setLogMessage("Nada para limpar.", true); return; }
    if (confirm("⚠️ Remover todos os pedidos da tela?")) limparDadosCompletamente();
  }

  function setupDragAndDrop() {
    const area = document.querySelector('.card:first-child');
    if (!area) return;
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => area.addEventListener(ev, e => e.preventDefault()));
    area.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if (file && file.name.match(/\.(csv|txt)$/i)) {
        fileInput.files = e.dataTransfer.files;
        processAndDisplayCSV(file);
      } else setLogMessage("Arraste apenas CSV.", true);
    });
  }

  // Inicialização
  function init() {
    loadSupabaseConfigFromStorage();
    btnCarregar.addEventListener("click", carregarArquivoHandler);
    btnRecarregar.addEventListener("click", recarregarUltimo);
    btnLimparTudo.addEventListener("click", limparComConfirmacao);
    saveConfigBtn.addEventListener("click", () => saveSupabaseConfigToLocal());
    testConnBtn.addEventListener("click", testSupabaseConnection);
    sendToSupabaseBtn.addEventListener("click", enviarPedidosParaSupabase);
    setupDragAndDrop();
  }
  init();
</script>
</body>
</html>
